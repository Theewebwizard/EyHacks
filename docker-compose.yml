version: '3.8'

services:
  redis:
    image: redis:alpine

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - backend-node
      - assistant-chatbot
      - realtime-voice

  mongodb:
    image: mongo:4.4
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  backend-node:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5001:5001"
    environment:
      - PORT=5001
      - MONGODB_URI=mongodb://mongodb:27017/myDatabase
      - JWT_SECRET=${JWT_SECRET}
      - REDIS_URL=redis://redis:6379
      - RABBITMQ_URL=amqp://rabbitmq:5672
    depends_on:
      - redis
      - rabbitmq

  assistant-chatbot:
    build:
      context: ./backend/Assistant_ChatBot
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - PINECONE_API_KEY=${PINECONE_API_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}

  realtime-voice:
    build:
      context: ./backend/python
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - API_KEY=${API_KEY}
      - DEEPGRAM_API_KEY=${DEEPGRAM_API_KEY}
      - RABBITMQ_URL=amqp://rabbitmq:5672

  python-worker:
    build:
      context: ./backend/python
      dockerfile: Dockerfile.worker
    environment:
      - RABBITMQ_URL=amqp://rabbitmq:5672
      - API_KEY=${API_KEY}
    depends_on:
      - rabbitmq

volumes:
  mongodb_data:
